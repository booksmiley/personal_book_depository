<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme-' + theme + '.css') }}" />
  </head>
  <body>
    <div class="scan-wrap">
      <h1>📚 Library</h1>

      <div id="mode" class="segment-control">
        <label class="segment"><input type="radio" name="mode" value="register" checked />Register</label>
        <label class="segment"><input type="radio" name="mode" value="borrow" />Borrow</label>
        <label class="segment"><input type="radio" name="mode" value="return" />Return</label>
        <label class="segment"><input type="radio" name="mode" value="collection" />Collection</label>
      </div>

      <div id="camera-ui">
        <button id="start">Start Camera</button>
        <button id="stop" disabled>Stop</button>
        <button id="snap" disabled>Snap</button>
        <video id="video" playsinline muted></video>
        <p id="status">Idle.</p>
        <div id="manual-entry">
          <input id="manual-isbn" type="text" inputmode="numeric"
                 placeholder="Enter ISBN manually" maxlength="17" autocomplete="off" />
          <button id="manual-go">Go</button>
        </div>
        <section id="result"></section>
      </div>
      <canvas id="snap-canvas" hidden></canvas>
    </div>

    <section id="collection" hidden>
      <div id="collection-header">
        <span id="collection-count"></span>
        <div class="view-toggle">
          <button id="view-grid-btn" class="view-btn active">⊞ Grid</button>
          <button id="view-list-btn" class="view-btn">≡ List</button>
        </div>
        <button id="reload-btn">↻ Reload</button>
      </div>
      <div id="collection-body"></div>
    </section>

    <script type="module" src="{{ url_for('static', filename='scan.js') }}"></script>
  </body>
</html>
